<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>晨报 Pro</title>
<style>
:root {
  --bg: #0d1117;
  --bg2: #161b22;
  --bg3: #1c2128;
  --border: #30363d;
  --text: #e6edf3;
  --text2: #8b949e;
  --text3: #6e7681;
  --up: #3fb950;
  --dn: #f85149;
  --up-bg: rgba(63,185,80,0.12);
  --dn-bg: rgba(248,81,73,0.12);
  --up-mid: rgba(63,185,80,0.2);
  --dn-mid: rgba(248,81,73,0.2);
  --up-strong: rgba(63,185,80,0.35);
  --dn-strong: rgba(248,81,73,0.35);
  --accent: #1f6feb;
  --gold: #d29922;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Mono', 'Helvetica Neue', monospace;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── HEADER ── */
.header {
  background: linear-gradient(180deg, #0d1117 0%, #161b22 100%);
  border-bottom: 1px solid var(--border);
  padding: 16px 16px 12px;
  position: sticky; top: 0; z-index: 10;
}
.header-top { display: flex; align-items: flex-start; justify-content: space-between; }
.header-title { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; color: var(--text); }
.header-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
.sentiment-chip {
  font-size: 10px; font-weight: 700; padding: 3px 10px;
  border-radius: 20px; letter-spacing: 0.5px;
}
.risk-on  { background: rgba(63,185,80,0.2);  color: #3fb950; border: 1px solid rgba(63,185,80,0.3); }
.risk-off { background: rgba(248,81,73,0.2);  color: #f85149; border: 1px solid rgba(248,81,73,0.3); }
.mixed    { background: rgba(210,153,34,0.2); color: #d29922; border: 1px solid rgba(210,153,34,0.3); }
.pulse-line {
  font-size: 11.5px; color: var(--text2); margin-top: 8px;
  line-height: 1.5; padding: 8px 10px;
  background: var(--bg3); border-radius: 6px;
  border-left: 3px solid var(--accent);
}

/* ── TABS ── */
.tabs {
  display: flex; gap: 0;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  overflow-x: auto; scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  font-size: 12px; font-weight: 600; padding: 10px 14px;
  color: var(--text3); cursor: pointer; white-space: nowrap;
  border-bottom: 2px solid transparent; transition: all 0.15s;
}
.tab.active { color: var(--text); border-bottom-color: var(--accent); }
.tab:hover:not(.active) { color: var(--text2); }

.tab-content { display: none; }
.tab-content.active { display: block; }

/* ── SECTION ── */
.section { padding: 12px 0; }
.section-title {
  font-size: 9.5px; font-weight: 700; color: var(--text3);
  text-transform: uppercase; letter-spacing: 1px;
  padding: 0 16px 6px;
}

/* ── PERFORMANCE TABLE ── */
.perf-table { width: 100%; border-collapse: collapse; }
.perf-table thead th {
  font-size: 9px; font-weight: 700; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.5px;
  text-align: right; padding: 4px 8px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
}
.perf-table thead th:first-child { text-align: left; padding-left: 16px; }
.perf-table thead th:last-child { padding-right: 16px; }
.perf-row { border-bottom: 1px solid rgba(48,54,61,0.6); }
.perf-row:hover { background: rgba(255,255,255,0.02); }
.perf-row td { padding: 8px 8px; vertical-align: middle; }
.perf-row td:first-child { padding-left: 16px; }
.perf-row td:last-child { padding-right: 16px; }
.asset-name { font-size: 12.5px; font-weight: 600; color: var(--text); }
.asset-sub { font-size: 9.5px; color: var(--text3); margin-top: 1px; }
.asset-price { font-size: 12.5px; font-weight: 700; color: var(--text); text-align: right; white-space: nowrap; }
.pct-cell { text-align: right; }
.pct-badge {
  display: inline-block;
  font-size: 10.5px; font-weight: 700;
  padding: 3px 6px; border-radius: 4px;
  min-width: 56px; text-align: center; white-space: nowrap;
}
.up-weak   { background: var(--up-bg);     color: var(--up); }
.up-mid    { background: var(--up-mid);    color: #5bdc6e; }
.up-strong { background: var(--up-strong); color: #7dffb3; }
.dn-weak   { background: var(--dn-bg);     color: var(--dn); }
.dn-mid    { background: var(--dn-mid);    color: #ff6b63; }
.dn-strong { background: var(--dn-strong); color: #ff9a94; }
.flat      { background: rgba(139,148,158,0.1); color: var(--text3); }

/* ── DIVIDER ROW ── */
.group-header td {
  font-size: 9px; font-weight: 700; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.8px;
  padding: 10px 16px 4px; background: var(--bg);
  border-bottom: none;
}

/* ── ANALYSIS CARDS ── */
.analysis-grid { padding: 0 12px 12px; display: flex; flex-direction: column; gap: 8px; }
.analysis-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px 14px;
}
.analysis-card-label {
  font-size: 10px; font-weight: 700; color: var(--accent);
  text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px;
}
.analysis-card-title { font-size: 12.5px; font-weight: 700; color: var(--text); margin-bottom: 5px; }
.analysis-card-body { font-size: 12px; color: var(--text2); line-height: 1.65; }

/* ── SELL-SIDE ── */
.ss-card {
  margin: 0 12px 8px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 8px; padding: 11px 13px;
}
.ss-bank {
  font-size: 9px; font-weight: 700; color: var(--gold);
  text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 2px;
}
.ss-date { font-size: 9px; color: var(--text3); margin-bottom: 5px; }
.ss-headline { font-size: 12.5px; font-weight: 700; color: var(--text); margin-bottom: 5px; }
.ss-note { font-size: 12px; color: var(--text2); line-height: 1.6; }

/* ── THEMES ── */
.theme-list { padding: 0 12px 12px; display: flex; flex-direction: column; gap: 6px; }
.theme-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 13px;
  display: flex; gap: 10px; align-items: flex-start;
}
.theme-num {
  font-size: 11px; font-weight: 700; color: var(--accent);
  min-width: 18px; margin-top: 1px;
}
.theme-text { font-size: 12px; color: var(--text2); line-height: 1.55; }

/* ── CHARTS TAB ── */
.chart-section { padding: 12px; display: flex; flex-direction: column; gap: 10px; }
.chart-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
  overflow: hidden;
}
.chart-card-label {
  font-size: 10px; font-weight: 700; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.7px;
  padding: 9px 12px 0;
}
.tradingview-widget-container { height: 220px; }
.tradingview-widget-container iframe { border: none; }
.chart-placeholder {
  height: 200px; display: flex; align-items: center; justify-content: center;
  color: var(--text3); font-size: 12px; flex-direction: column; gap: 6px;
}
.chart-placeholder a { color: var(--accent); text-decoration: none; font-size: 13px; font-weight: 600; }

/* ── TIME TOGGLE ── */
.time-toggle {
  display: flex; gap: 4px; padding: 10px 16px 2px;
}
.time-btn {
  font-size: 10px; font-weight: 700; padding: 3px 8px;
  border-radius: 4px; cursor: pointer; border: 1px solid var(--border);
  background: transparent; color: var(--text3); transition: all 0.15s;
}
.time-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

/* ── FOOTER ── */
.footer {
  text-align: center; font-size: 9.5px; color: var(--text3);
  padding: 16px; border-top: 1px solid var(--border); margin-top: 4px;
}

/* ── SECTOR ROTATION ── */
.sector-table { width: 100%; border-collapse: collapse; }
.sector-table thead th {
  font-size: 9px; font-weight: 700; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.5px;
  text-align: right; padding: 4px 8px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
}
.sector-table thead th:first-child { text-align: left; padding-left: 16px; }
.sector-table thead th:last-child { padding-right: 16px; }
.sector-row { border-bottom: 1px solid rgba(48,54,61,0.6); }
.sector-row:hover { background: rgba(255,255,255,0.02); }
.sector-row td { padding: 7px 8px; vertical-align: top; }
.sector-row td:first-child { padding-left: 16px; }
.sector-row td:last-child { padding-right: 16px; text-align: right; }
.sector-row td:nth-child(2) { text-align: right; }
.sector-name { font-size: 12px; font-weight: 600; color: var(--text); }
.sector-ticker { font-size: 9.5px; color: var(--text3); margin-top: 1px; }
.sector-note { font-size: 10px; color: var(--text3); margin-top: 3px; line-height: 1.4; max-width: 200px; }
.signal-badge {
  display: inline-flex; align-items: center; gap: 2px;
  font-size: 9px; font-weight: 700;
  padding: 2px 5px; border-radius: 3px; white-space: nowrap;
  margin-bottom: 3px;
}
.sig-in     { background: rgba(63,185,80,0.15);  color: #3fb950; }
.sig-out    { background: rgba(248,81,73,0.15);  color: #f85149; }
.sig-neutral { background: rgba(139,148,158,0.12); color: var(--text2); }
.rotation-narrative {
  margin: 8px 12px 4px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 8px; padding: 11px 13px;
  font-size: 11.5px; color: var(--text2); line-height: 1.6;
  border-left: 3px solid var(--accent);
}
.market-label {
  font-size: 9.5px; font-weight: 700; color: var(--text3);
  text-transform: uppercase; letter-spacing: 1px;
  padding: 10px 16px 4px;
}

/* ── SECTOR EXPAND ── */
.sector-expand-btn {
  display: inline-block; margin-top: 5px;
  font-size: 9.5px; font-weight: 700; color: var(--accent);
  background: transparent; border: 1px solid rgba(31,111,235,0.3);
  padding: 2px 7px; border-radius: 3px; cursor: pointer;
  transition: all 0.15s;
}
.sector-expand-btn:hover { background: rgba(31,111,235,0.1); }
.sector-detail-panel {
  display: none;
  background: var(--bg3);
  border-top: 1px solid var(--border);
}
.sector-detail-panel.open { display: block; }
.sector-detail-inner { padding: 10px 16px 12px; }
.performer-group-label {
  font-size: 9px; font-weight: 700; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.8px;
  margin-bottom: 5px; margin-top: 8px;
}
.performer-group-label:first-child { margin-top: 0; }
.performer-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 5px 0; border-bottom: 1px solid rgba(48,54,61,0.35);
}
.performer-item:last-child { border-bottom: none; }
.performer-left { display: flex; flex-direction: column; gap: 1px; }
.performer-ticker-name { font-size: 12px; font-weight: 700; color: var(--text); }
.performer-desc { font-size: 10px; color: var(--text3); }
.sector-long-note {
  margin-top: 10px; padding-top: 10px;
  border-top: 1px solid rgba(48,54,61,0.5);
  font-size: 12px; color: var(--text2); line-height: 1.7;
}

/* ── FCN TABLE ── */
.fcn-note {
  margin: 0 12px 10px;
  background: rgba(210,153,34,0.08); border: 1px solid rgba(210,153,34,0.25);
  border-radius: 8px; padding: 10px 13px;
  font-size: 11.5px; color: var(--text2); line-height: 1.55;
}
.fcn-table { width: 100%; border-collapse: collapse; }
.fcn-table thead th {
  font-size: 9px; font-weight: 700; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.5px;
  text-align: right; padding: 5px 8px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
}
.fcn-table thead th:first-child { text-align: left; padding-left: 16px; }
.fcn-table thead th:last-child { padding-right: 16px; }
.fcn-row { border-bottom: 1px solid rgba(48,54,61,0.6); cursor: pointer; transition: background 0.1s; }
.fcn-row:hover { background: rgba(210,153,34,0.04); }
.fcn-row td { padding: 9px 8px; vertical-align: middle; }
.fcn-row td:first-child { padding-left: 16px; }
.fcn-row td:last-child { padding-right: 16px; text-align: right; }
.fcn-name { font-size: 12.5px; font-weight: 700; color: var(--text); }
.fcn-sector-tag { font-size: 9px; color: var(--text3); }
.fcn-iv-val { font-size: 12.5px; font-weight: 700; color: var(--gold); }
.fcn-iv-note { font-size: 9.5px; color: var(--text3); }
.fcn-expand-icon { font-size: 11px; color: var(--text3); transition: transform 0.2s; }
.fcn-expand-icon.rotated { transform: rotate(180deg); }
.fcn-detail-row { display: none; }
.fcn-detail-row.open { display: table-row; }
.fcn-detail-cell {
  background: var(--bg3);
  border-bottom: 1px solid var(--border);
  padding: 14px 16px !important;
}
.fcn-structure-box {
  background: rgba(31,111,235,0.08); border: 1px solid rgba(31,111,235,0.2);
  border-radius: 6px; padding: 9px 12px; margin-bottom: 12px;
  font-size: 11.5px; color: var(--text2); line-height: 1.5;
}
.fcn-structure-label {
  font-size: 9px; font-weight: 700; color: var(--accent);
  text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 3px;
}
.thesis-section { margin-bottom: 10px; }
.thesis-label {
  font-size: 9px; font-weight: 700; color: var(--gold);
  text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 5px;
}
.thesis-body {
  font-size: 12px; color: var(--text2); line-height: 1.7;
}
.thesis-tech {
  background: var(--bg2); border-radius: 6px; padding: 10px 12px;
  border-left: 3px solid var(--gold);
  font-size: 12px; color: var(--text2); line-height: 1.65;
}
.fcn-group-row td {
  font-size: 9px; font-weight: 700; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.9px;
  padding: 10px 16px 5px; background: var(--bg);
  border-bottom: 1px solid var(--border);
}
</style>
</head>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div>
      <div class="header-title">📊 晨报 Pro</div>
      <div class="header-sub" id="hdr-meta">—</div>
    </div>
    <div id="hdr-sentiment"></div>
  </div>
  <div class="pulse-line" id="hdr-pulse">加载中...</div>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="switchTab('markets')">市场数据</div>
  <div class="tab" onclick="switchTab('sectors')">板块轮动</div>
  <div class="tab" onclick="switchTab('analysis')">驱动解读</div>
  <div class="tab" onclick="switchTab('sellside')">卖方观点</div>
  <div class="tab" onclick="switchTab('fcn')">FCN候选</div>
</div>

<!-- TAB: MARKETS -->
<div class="tab-content active" id="tab-markets">
  <div style="padding:10px 16px 2px; display:flex; align-items:center; justify-content:space-between;">
    <span style="font-size:10px;color:var(--text3);">涨跌幅</span>
    <div class="time-toggle" style="padding:0;">
      <button class="time-btn active" onclick="setTimeframe('d1')">1D</button>
      <button class="time-btn" onclick="setTimeframe('w1')">1W</button>
      <button class="time-btn" onclick="setTimeframe('m1')">1M</button>
      <button class="time-btn" onclick="setTimeframe('m6')">YTD</button>
    </div>
  </div>
  <table class="perf-table">
    <thead>
      <tr>
        <th style="text-align:left">资产</th>
        <th>价格</th>
        <th id="th-pct">1日</th>
      </tr>
    </thead>
    <tbody id="market-tbody"></tbody>
  </table>
</div>

<!-- TAB: SECTORS -->
<div class="tab-content" id="tab-sectors">
  <div style="height:4px"></div>
  <div class="market-label">🇺🇸 美股板块轮动 · S&P 500</div>
  <table class="sector-table">
    <thead>
      <tr>
        <th style="text-align:left">板块</th>
        <th>今日</th>
        <th>年初至今</th>
      </tr>
    </thead>
    <tbody id="us-sector-tbody"></tbody>
  </table>
  <div class="rotation-narrative" id="us-rotation-note"></div>

  <div class="market-label" style="margin-top:10px">🇭🇰 港股板块轮动 · HSI</div>
  <div id="hk-sector-list" style="padding: 0 12px;"></div>
  <div class="rotation-narrative" id="hk-rotation-note"></div>
  <div style="height:16px"></div>
</div>

<!-- TAB: ANALYSIS -->
<div class="tab-content" id="tab-analysis">
  <div style="height:8px"></div>
  <div class="analysis-grid" id="analysis-grid"></div>
</div>

<!-- TAB: SELL-SIDE -->
<div class="tab-content" id="tab-sellside">
  <div style="height:8px"></div>
  <div id="themes-section">
    <div class="section-title" style="padding: 8px 16px 4px;">市场在讨论</div>
    <div class="theme-list" id="theme-list"></div>
  </div>
  <div style="height:4px"></div>
  <div class="section-title" style="padding: 8px 16px 4px;">卖方最新观点</div>
  <div id="ss-list"></div>
</div>

<!-- TAB: FCN候选 -->
<div class="tab-content" id="tab-fcn">
  <div style="height:8px"></div>
  <div class="fcn-note">
    <strong style="color:var(--gold);">FCN候选筛选标准</strong><br>
    隐含波动率 (IV) 明显高于历史均值 · 流动性充足 · 有明确基本面催化剂 · 结构适合做区间/轻看涨。
    点击任一标的查看完整投资逻辑。
  </div>
  <table class="fcn-table">
    <thead>
      <tr>
        <th style="text-align:left">标的</th>
        <th>价格</th>
        <th>今日</th>
        <th>隐含波动率</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="fcn-tbody"></tbody>
  </table>
  <div style="height:16px"></div>
</div>


<div class="footer" id="footer-text">数据: Yahoo Finance · AI解读仅供参考 · 不构成投资建议</div>

// ── STATE ──
let currentTimeframe = 'd1';
let currentTab = 'markets';

// ── TAB SWITCHING ──
function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  const tabs = ['markets','sectors','analysis','sellside','fcn'];
  document.querySelectorAll('.tab')[tabs.indexOf(tab)].classList.add('active');
  currentTab = tab;
}

// ── TIMEFRAME ──
function setTimeframe(tf) {
  currentTimeframe = tf;
  document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  const labels = { d1: '1日', w1: '1周', m1: '1月', m6: 'YTD' };
  document.getElementById('th-pct').textContent = tf === 'm6' ? 'YTD' : labels[tf];
  renderMarkets();
}

// ── HELPERS ──
function pctClass(val, tf) {
  const n = parseFloat(val);
  if (Math.abs(n) < 0.05) return 'flat';
  const thresholds = { d1: [0.5, 1.5], w1: [1, 3], m1: [2, 6], m6: [5, 15] };
  const [lo, hi] = thresholds[tf] || [1, 3];
  if (n > 0) return n > hi ? 'up-strong' : n > lo ? 'up-mid' : 'up-weak';
  return Math.abs(n) > hi ? 'dn-strong' : Math.abs(n) > lo ? 'dn-mid' : 'dn-weak';
}

function getVal(item, tf) {
  return { d1: item.d1, w1: item.w1, m1: item.m1, m6: item.m6 }[tf];
}

function pctBadgeStr(val, tf) {
  const cls = pctClass(val, tf || 'd1');
  return `<span class="pct-badge ${cls}">${val}</span>`;
}

// ── RENDER MARKETS ──
function renderMarkets() {
  const tbody = document.getElementById('market-tbody');
  let html = '';
  for (const item of BRIEFING.assets) {
    if (item.group) {
      html += `<tr class="perf-row group-header"><td colspan="3">${item.group}</td></tr>`;
      continue;
    }
    const val = getVal(item, currentTimeframe);
    const cls = pctClass(val, currentTimeframe);
    html += `<tr class="perf-row">
      <td><div class="asset-name">${item.name}</div><div class="asset-sub">${item.tk}</div></td>
      <td class="asset-price">${item.price}</td>
      <td class="pct-cell"><span class="pct-badge ${cls}">${val}</span></td>
    </tr>`;
  }
  tbody.innerHTML = html;
}

// ── RENDER SECTORS ──
function toggleSectorDetail(idx) {
  const panel = document.getElementById('sector-panel-' + idx);
  const btn = document.getElementById('sector-btn-' + idx);
  if (panel.classList.contains('open')) {
    panel.classList.remove('open');
    btn.textContent = '展开 ▾';
  } else {
    panel.classList.add('open');
    btn.textContent = '收起 ▴';
  }
}

function renderSectors() {
  if (!BRIEFING.sectors) return;
  const s = BRIEFING.sectors;

  let usHtml = '';
  s.us.forEach((sec, idx) => {
    const sigCls = sec.signal === 'in' ? 'sig-in' : sec.signal === 'out' ? 'sig-out' : 'sig-neutral';
    const sigTxt = sec.signal === 'in' ? '▲ 流入' : sec.signal === 'out' ? '▼ 流出' : '— 中性';
    const d1Cls  = pctClass(sec.d1, 'd1');
    const ytdCls = pctClass(sec.ytd, 'm6');

    // Build performers HTML
    let performersHtml = '';
    if (sec.topPerformers && sec.topPerformers.length) {
      performersHtml += `<div class="performer-group-label">⬆ 今日领涨</div>`;
      sec.topPerformers.forEach(p => {
        const pCls = pctClass(p.change, 'd1');
        performersHtml += `<div class="performer-item">
          <div class="performer-left">
            <span class="performer-ticker-name">${p.name} <span style="color:var(--text3);font-size:10px;font-weight:400;">${p.ticker}</span></span>
            <span class="performer-desc">${p.note}</span>
          </div>
          <span class="pct-badge ${pCls}" style="min-width:52px">${p.change}</span>
        </div>`;
      });
    }
    if (sec.worstPerformers && sec.worstPerformers.length) {
      performersHtml += `<div class="performer-group-label" style="margin-top:10px">⬇ 今日垫底</div>`;
      sec.worstPerformers.forEach(p => {
        const pCls = pctClass(p.change, 'd1');
        performersHtml += `<div class="performer-item">
          <div class="performer-left">
            <span class="performer-ticker-name">${p.name} <span style="color:var(--text3);font-size:10px;font-weight:400;">${p.ticker}</span></span>
            <span class="performer-desc">${p.note}</span>
          </div>
          <span class="pct-badge ${pCls}" style="min-width:52px">${p.change}</span>
        </div>`;
      });
    }
    if (sec.longNote) {
      performersHtml += `<div class="sector-long-note">${sec.longNote}</div>`;
    }

    usHtml += `<tr class="sector-row">
      <td colspan="3" style="padding:0;">
        <div style="padding:8px 8px 4px 16px;">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;">
            <div style="flex:1;">
              <span class="signal-badge ${sigCls}">${sigTxt}</span>
              <div class="sector-name">${sec.name}</div>
              <div class="sector-ticker">${sec.etf} · ${sec.weight}</div>
              <div class="sector-note">${sec.note}</div>
              <button class="sector-expand-btn" id="sector-btn-${idx}" onclick="toggleSectorDetail(${idx})">展开 ▾</button>
            </div>
            <div style="text-align:right;padding-top:18px;min-width:100px;">
              <div>${pctBadgeStr(sec.d1, 'd1')}</div>
              <div style="margin-top:4px;">${pctBadgeStr(sec.ytd, 'm6')}</div>
              <div style="font-size:9px;color:var(--text3);margin-top:2px;">YTD</div>
            </div>
          </div>
        </div>
        <div class="sector-detail-panel" id="sector-panel-${idx}">
          <div class="sector-detail-inner">${performersHtml}</div>
        </div>
      </td>
    </tr>`;
  });
  document.getElementById('us-sector-tbody').innerHTML = usHtml;
  document.getElementById('us-rotation-note').textContent = s.usNote;

  // HK sectors
  const hkHtml = s.hk.map(sec => {
    const sigCls = sec.signal === 'in' ? 'sig-in' : sec.signal === 'out' ? 'sig-out' : 'sig-neutral';
    const sigTxt = sec.signal === 'in' ? '▲ 流入' : sec.signal === 'out' ? '▼ 流出' : '— 中性';
    return `<div class="analysis-card" style="margin-bottom:6px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:3px">
        <div class="analysis-card-title" style="margin:0">${sec.name}</div>
        <span class="signal-badge ${sigCls}">${sigTxt}</span>
      </div>
      <div class="sector-ticker" style="margin-bottom:5px">${sec.tickers}</div>
      <div class="analysis-card-body">${sec.note}</div>
    </div>`;
  }).join('');
  document.getElementById('hk-sector-list').innerHTML = hkHtml;
  document.getElementById('hk-rotation-note').textContent = s.hkNote;
}

// ── RENDER ANALYSIS ──
function renderAnalysis() {
  document.getElementById('analysis-grid').innerHTML = BRIEFING.drivers.map(d => `
    <div class="analysis-card">
      <div class="analysis-card-label">${d.label}</div>
      <div class="analysis-card-title">${d.title}</div>
      <div class="analysis-card-body">${d.body}</div>
    </div>`).join('');
}

// ── RENDER SELL-SIDE ──
function renderSellside() {
  document.getElementById('ss-list').innerHTML = BRIEFING.sellside.map(ss => `
    <div class="ss-card">
      <div class="ss-bank">${ss.bank}</div>
      <div class="ss-date">${ss.date}</div>
      <div class="ss-headline">${ss.headline}</div>
      <div class="ss-note">${ss.note}</div>
    </div>`).join('');

  document.getElementById('theme-list').innerHTML = BRIEFING.themes.map((t, i) => `
    <div class="theme-card">
      <div class="theme-num">${i + 1}</div>
      <div class="theme-text">${t}</div>
    </div>`).join('');
}

// ── RENDER FCN ──
function toggleFCN(idx) {
  const detail = document.getElementById('fcn-detail-' + idx);
  const icon = document.getElementById('fcn-icon-' + idx);
  const isOpen = detail.classList.contains('open');
  // Close all
  document.querySelectorAll('.fcn-detail-row').forEach(r => r.classList.remove('open'));
  document.querySelectorAll('.fcn-expand-icon').forEach(i => i.classList.remove('rotated'));
  // Toggle current
  if (!isOpen) {
    detail.classList.add('open');
    icon.classList.add('rotated');
  }
}

function renderFCN() {
  if (!BRIEFING.fcn) return;
  let html = '';
  let dataIdx = 0;
  BRIEFING.fcn.forEach((f) => {
    if (f.group) {
      html += `<tr class="fcn-group-row"><td colspan="5">${f.group}</td></tr>`;
      return;
    }
    const idx = dataIdx++;
    html += `<tr class="fcn-row" onclick="toggleFCN(${idx})">
      <td>
        <div class="fcn-name">${f.ticker}</div>
        <div class="fcn-sector-tag">${f.name} · ${f.sector}</div>
      </td>
      <td style="text-align:right"><span style="font-size:12.5px;font-weight:700;">${f.price}</span></td>
      <td style="text-align:right">${pctBadgeStr(f.d1, 'd1')}</td>
      <td style="text-align:right">
        <div class="fcn-iv-val">${f.iv}</div>
        <div class="fcn-iv-note">${f.ivNote}</div>
      </td>
      <td style="text-align:right;padding-right:14px"><span class="fcn-expand-icon" id="fcn-icon-${idx}">▼</span></td>
    </tr>
    <tr class="fcn-detail-row" id="fcn-detail-${idx}">
      <td colspan="5" class="fcn-detail-cell">
        <div class="fcn-structure-box">
          <div class="fcn-structure-label">参考结构</div>
          ${f.structure}
        </div>
        <div class="thesis-section">
          <div class="thesis-label">📋 中长期投资逻辑</div>
          <div class="thesis-body">${f.thesis.medLong}</div>
        </div>
        <div class="thesis-section">
          <div class="thesis-label">📈 技术面分析</div>
          <div class="thesis-tech">${f.thesis.technical}</div>
        </div>
      </td>
    </tr>`;
  });
  document.getElementById('fcn-tbody').innerHTML = html;
}

// ── TRADINGVIEW WIDGETS ──
let tvLoaded = false;
function loadTVWidgets() {
  if (tvLoaded) return;
  tvLoaded = true;
  const charts = [
    { id: 'tv-sp500',  symbol: 'SP:SPX',    interval: 'W' },
    { id: 'tv-hsi',    symbol: 'HSI:HSI',   interval: 'W' },
    { id: 'tv-gold',   symbol: 'COMEX:GC1!',interval: 'W' },
    { id: 'tv-usdcnh', symbol: 'FX:USDCNH', interval: 'W' },
    { id: 'tv-oil',    symbol: 'NYMEX:CL1!',interval: 'W' },
  ];
  charts.forEach(c => {
    const el = document.getElementById(c.id);
    if (!el) return;
    const container = document.createElement('div');
    container.className = 'tradingview-widget-container';
    container.style.height = '220px';
    const script = document.createElement('script');
    script.type = 'text/javascript';
    script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js';
    script.async = true;
    script.innerHTML = JSON.stringify({
      symbol: c.symbol, width: '100%', height: '220', locale: 'en',
      dateRange: '6M', colorTheme: 'dark', isTransparent: true,
      autosize: true, largeChartUrl: 'https://www.tradingview.com/chart/', noTimeScale: false,
    });
    container.appendChild(script);
    el.parentElement.replaceChild(container, el);
  });
}

// ── HEADER ──
function renderHeader() {
  document.getElementById('hdr-meta').textContent = BRIEFING.updatedAt + ' · 数据: ' + BRIEFING.date;
  document.getElementById('hdr-pulse').textContent = BRIEFING.pulse;
  const s = BRIEFING.sentiment;
  const cls = s === 'RISK ON' ? 'risk-on' : s === 'RISK OFF' ? 'risk-off' : 'mixed';
  const emoji = s === 'RISK ON' ? '🟢' : s === 'RISK OFF' ? '🔴' : '🟡';
  document.getElementById('hdr-sentiment').innerHTML =
    `<span class="sentiment-chip ${cls}">${emoji} ${s}</span>`;
}

// ── INIT ──
renderHeader();
renderMarkets();
renderSectors();
renderAnalysis();
renderSellside();
renderFCN();
</script>
</body>
</html>
